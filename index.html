<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Energy Bowl Builder</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Build Your Custom Energy Bowl 🥣</h1>
        <p>Create your perfect bowl by choosing your favorite ingredients.</p>

        <form id="bowlForm">
            <fieldset>
                <legend>Bowl Details</legend>

                <label for="base">Choose a Base:</label>
                <select id="base" name="base" required>
                    <option value="">-- Select a Base --</option>
                    <option value="Acai">Acai</option>
                    <option value="Greek Yogurt">Greek Yogurt</option>
                    <option value="Oatmeal">Oatmeal</option>
                    <option value="Chia Pudding">Chia Pudding</option>
                </select>

                <p>Choose Fruits:</p>
                <label><input type="checkbox" name="fruits" value="Banana"> Banana</label>
                <label><input type="checkbox" name="fruits" value="Strawberry"> Strawberry</label>
                <label><input type="checkbox" name="fruits" value="Blueberry"> Blueberry</label>
                <label><input type="checkbox" name="fruits" value="Mango"> Mango</label>

                <p>Choose Toppings:</p>
                <label><input type="checkbox" name="toppings" value="Granola"> Granola</label>
                <label><input type="checkbox" name="toppings" value="Coconut Flakes"> Coconut Flakes</label>
                <label><input type="checkbox" name="toppings" value="Almonds"> Almonds</label>
                <label><input type="checkbox" name="toppings" value="Chia Seeds"> Chia Seeds</label>

                <label for="protein">Protein Add-On:</label>
                <select id="protein" name="protein">
                    <option value="None">None</option>
                    <option value="Vanilla Protein">Vanilla Protein</option>
                    <option value="Chocolate Protein">Chocolate Protein</option>
                    <option value="Peanut Butter Protein">Peanut Butter Protein</option>
                </select>

                <label for="sweetener">Sweetener:</label>
                <select id="sweetener" name="sweetener">
                    <option value="None">None</option>
                    <option value="Honey">Honey</option>
                    <option value="Maple Syrup">Maple Syrup</option>
                    <option value="Agave">Agave</option>
                </select>

                <p>Choose Size:</p>
                <label><input type="radio" name="size" value="Small" required> Small</label>
                <label><input type="radio" name="size" value="Medium"> Medium</label>
                <label><input type="radio" name="size" value="Large"> Large</label>

                <label for="instructions">Special Instructions:</label>
                <textarea id="instructions" name="instructions" rows="4" placeholder="Enter any special requests here..."></textarea>

                <button type="submit">Place Order</button>
            </fieldset>
        </form>

        <section id="output">
            <h2>Your Order Summary</h2>
            <p>Your customized bowl will appear here after you place your order.</p>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
